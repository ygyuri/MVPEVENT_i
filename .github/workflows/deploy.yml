name: Build and Deploy to VM

# noop: trigger deploy workflow on push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ====================
  # BUILD JOB
  # ====================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Verify image assets
        run: |
          echo "🔍 Checking image assets..."
          echo "📁 Client directory structure:"
          ls -la client/ || echo "No client directory"
          echo "📁 Client public directory contents:"
          if [ -d "client/public/" ]; then
            ls -la client/public/ || echo "No public directory"
            echo "📁 Client logos directory contents:"
            if [ -d "client/public/logos/" ]; then
              ls -la client/public/logos/ || echo "No logos directory"
            fi
          fi
          echo "📁 Server uploads directory contents:"
          ls -la server/uploads/ || echo "No uploads directory"
          echo "✅ Image asset verification completed"
      - name: Build images (no push)
        timeout-minutes: 20
        run: docker compose -f docker-compose.prod.yml build

  # ====================
  # TRANSFER JOB
  # ====================
  transfer:
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Create production environment file
        run: |
          cat > .env.production << 'EOF'
          # Application Configuration
          NODE_ENV=${{ secrets.NODE_ENV }}
          SERVER_PORT=${{ secrets.SERVER_PORT }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          BASE_URL=${{ secrets.BASE_URL }}
          
          # GKE Configuration
          KUBERNETES_NAMESPACE=${{ secrets.KUBERNETES_NAMESPACE }}
          GKE_CLUSTER_NAME=${{ secrets.GKE_CLUSTER_NAME }}
          GKE_ZONE=${{ secrets.GKE_ZONE }}
          PROJECT_ID=${{ secrets.PROJECT_ID }}
          
          # Nginx Configuration
          NGINX_HTTP_PORT=${{ secrets.NGINX_HTTP_PORT }}
          NGINX_HTTPS_PORT=${{ secrets.NGINX_HTTPS_PORT }}
          
          # Database Configuration
          MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          
          # Redis Configuration
          REDIS_URL=${{ secrets.REDIS_URL }}
          
          # JWT Configuration
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          
          # PayHero Configuration
          PAYHERO_API_USERNAME=${{ secrets.PAYHERO_API_USERNAME }}
          PAYHERO_API_PASSWORD=${{ secrets.PAYHERO_API_PASSWORD }}
          PAYHERO_ACCOUNT_ID=${{ secrets.PAYHERO_ACCOUNT_ID }}
          PAYHERO_BASIC_AUTH_TOKEN=${{ secrets.PAYHERO_BASIC_AUTH_TOKEN }}
          PAYHERO_CHANNEL_ID=${{ secrets.PAYHERO_CHANNEL_ID }}
          PAYHERO_CALLBACK_URL=${{ secrets.PAYHERO_CALLBACK_URL }}
          PAYHERO_SUCCESS_URL=${{ secrets.PAYHERO_SUCCESS_URL }}
          PAYHERO_FAILED_URL=${{ secrets.PAYHERO_FAILED_URL }}
          
          # MPESA Configuration
          MPESA_BASE_URL=${{ secrets.MPESA_BASE_URL }}
          MPESA_CONSUMER_KEY=${{ secrets.MPESA_CONSUMER_KEY }}
          MPESA_CONSUMER_SECRET=${{ secrets.MPESA_CONSUMER_SECRET }}
          MPESA_PASSKEY=${{ secrets.MPESA_PASSKEY }}
          MPESA_SHORTCODE=${{ secrets.MPESA_SHORTCODE }}
          MPESA_CALLBACK_URL=${{ secrets.MPESA_CALLBACK_URL }}
          MPESA_TIMEOUT_URL=${{ secrets.MPESA_TIMEOUT_URL }}
          
          # Email Configuration
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}

          # Google OAuth Configuration
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          CALLBACK_URL=${{ secrets.CALLBACK_URL }}
          
          # Security Configuration
          TICKET_QR_SECRET=${{ secrets.TICKET_QR_SECRET }}
          TICKET_QR_ENC_KEY=${{ secrets.TICKET_QR_ENC_KEY }}
          TICKET_QR_AUTO_ROTATE_MS=${{ secrets.TICKET_QR_AUTO_ROTATE_MS }}
          
          # Rate Limiting
          RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          
          # Debug Configuration
          DEBUG=${{ secrets.DEBUG }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          
          # Monitoring and Logging
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          LOG_TO_FILE=${{ secrets.LOG_TO_FILE }}
          LOG_FILE_PATH=${{ secrets.LOG_FILE_PATH }}
          EOF
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 180s
          command_timeout: 5m
          debug: true
          script: |
            echo "✅ SSH connection test successful!"
            echo "Server: $(hostname)"
            echo "User: $(whoami)"
            echo "IP: $(hostname -I | awk '{print $1}')"
            
      - name: Transfer environment file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: ".env.production"
          target: "/tmp/.env.production"
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 180s
          command_timeout: 10m
          debug: true

  # ====================
  # DOCKER CLEANUP JOB
  # ====================
  docker-cleanup:
    needs: transfer
    runs-on: ubuntu-latest
    if: always() && needs.transfer.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Docker cleanup on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            echo "🧹 Starting Docker cleanup..."
            
            # Check disk usage before cleanup
            echo "📊 Disk Usage Before Cleanup:"
            df -h / || true
            echo ""
            echo "🐳 Docker Disk Usage Before Cleanup:"
            sudo docker system df || true
            echo ""
            
            # Clean up Docker resources
            echo "🧹 Cleaning up Docker resources..."
            sudo docker container prune -f || true
            sudo docker image prune -f || true
            sudo docker volume prune -f || true
            sudo docker network prune -f || true
            sudo docker builder prune -af || true
            sudo docker image prune -af || true
            
            # Check disk usage after cleanup
            echo ""
            echo "📊 Disk Usage After Cleanup:"
            df -h / || true
            echo ""
            echo "🐳 Docker Disk Usage After Cleanup:"
            sudo docker system df || true
            echo ""
            echo "✅ Docker cleanup completed!"

  # ====================
  # EXECUTE JOB
  # ====================
  execute:
    needs: [transfer, docker-cleanup]
    runs-on: ubuntu-latest
    if: always() && needs.transfer.result == 'success' && needs.docker-cleanup.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -e
            cat > /tmp/deploy.sh << 'DEPLOYMENT_SCRIPT'
            set -e
            echo "🚀 Starting deployment..."
            
            # Ensure git and other essential tools are installed
            echo "📦 Checking for required tools..."
            if ! command -v git &> /dev/null; then
              echo "📥 Installing git..."
              sudo apt update
              sudo apt install -y git curl
            fi
            
            # Ensure repo exists and is up to date
            if [ -d /root/MVPEVENT_i/.git ]; then
              echo "📁 Repository exists, updating..."
              cd /root/MVPEVENT_i
              git remote set-url origin https://github.com/ygyuri/MVPEVENT_i.git
              git fetch --all
              git reset --hard origin/main
            else
              echo "📁 Cloning repository..."
              rm -rf /root/MVPEVENT_i || true
              git clone https://github.com/ygyuri/MVPEVENT_i.git /root/MVPEVENT_i
              cd /root/MVPEVENT_i
            fi
            
            # Move and secure environment file
            if [ -d /tmp/.env.production ]; then
              sudo cp /tmp/.env.production/.env.production /root/MVPEVENT_i/.env.production
              sudo rm -rf /tmp/.env.production
            else
              sudo mv /tmp/.env.production /root/MVPEVENT_i/.env.production
            fi
            
            # Set proper permissions
            sudo chmod 755 /root/MVPEVENT_i
            sudo chown root:root /root/MVPEVENT_i/.env.production
            sudo chmod 600 /root/MVPEVENT_i/.env.production
            sudo cp /root/MVPEVENT_i/.env.production /root/MVPEVENT_i/.env
            sudo chown root:docker /root/MVPEVENT_i/.env
            sudo chmod 640 /root/MVPEVENT_i/.env
            
            # Ensure Docker is installed
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt update
              sudo apt install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt update
              sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            fi
            
            # Setup SSL certificates with expiry checking
            sudo mkdir -p /root/MVPEVENT_i/nginx/ssl
            
            CERT_PATH="/etc/letsencrypt/live/event-i.co.ke/fullchain.pem"
            
            if [ -f "$CERT_PATH" ]; then
              # Certificate exists, check expiry date
              echo "🔍 Checking certificate expiry..."
              CERT_EXPIRY=$(sudo openssl x509 -enddate -noout -in "$CERT_PATH" | cut -d= -f2)
              CERT_EXPIRY_EPOCH=$(date -d "$CERT_EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %H:%M:%S %Y" "$CERT_EXPIRY" +%s 2>/dev/null || echo "0")
              CURRENT_EPOCH=$(date +%s)
              DAYS_UNTIL_EXPIRY=$(( (CERT_EXPIRY_EPOCH - CURRENT_EPOCH) / 86400 ))
              
              if [ $DAYS_UNTIL_EXPIRY -gt 30 ]; then
                echo "✅ Using existing valid SSL certificate (expires in $DAYS_UNTIL_EXPIRY days)"
                sudo cp "$CERT_PATH" /root/MVPEVENT_i/nginx/ssl/cert.pem
                sudo cp /etc/letsencrypt/live/event-i.co.ke/privkey.pem /root/MVPEVENT_i/nginx/ssl/key.pem
              else
                echo "⚠️ Certificate expiring soon ($DAYS_UNTIL_EXPIRY days), attempting renewal..."
                # Stop nginx containers and any services using port 80 for certbot renewal
                echo "🛑 Stopping services using port 80..."
                cd /root/MVPEVENT_i || true
                
                # Stop Docker nginx containers if they exist
                if sudo docker ps -a --format '{{.Names}}' | grep -q nginx; then
                  sudo docker compose -f docker-compose.prod.yml stop nginx 2>/dev/null || true
                  sudo docker compose -f docker-compose.prod.yml rm -f nginx 2>/dev/null || true
                fi
                
                # Stop system nginx or other services using port 80
                sudo systemctl stop nginx 2>/dev/null || true
                sudo pkill -f nginx 2>/dev/null || true
                
                # Kill any process using port 80 (only if something is using it)
                PORT80_PIDS=$(sudo lsof -ti:80 2>/dev/null || echo "")
                if [ ! -z "$PORT80_PIDS" ]; then
                  echo "$PORT80_PIDS" | xargs sudo kill -9 2>/dev/null || true
                  sleep 2
                fi
                sleep 1
                
                # Verify port 80 is free
                if sudo lsof -i:80 > /dev/null 2>&1; then
                  echo "⚠️ Port 80 still in use after cleanup attempts, skipping renewal"
                  echo "   Using existing certificate (will need manual renewal)"
                else
                  echo "✅ Port 80 is free, attempting certificate renewal..."
                  # Try to renew using standalone mode (requires port 80)
                  sudo certbot renew --cert-name event-i.co.ke --non-interactive --standalone 2>&1 || {
                    echo "⚠️ Renewal failed or not needed, using existing certificate"
                  }
                fi
                
                # Copy the certificate (renewed or existing)
                sudo mkdir -p /root/MVPEVENT_i/nginx/ssl
                if [ -f "$CERT_PATH" ] && [ -f "/etc/letsencrypt/live/event-i.co.ke/privkey.pem" ]; then
                  sudo cp "$CERT_PATH" /root/MVPEVENT_i/nginx/ssl/cert.pem
                  sudo cp /etc/letsencrypt/live/event-i.co.ke/privkey.pem /root/MVPEVENT_i/nginx/ssl/key.pem
                  echo "✅ Certificate files copied successfully"
                else
                  echo "⚠️ Certificate files not found, will create self-signed certificate"
                  sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                    -keyout /root/MVPEVENT_i/nginx/ssl/key.pem \
                    -out /root/MVPEVENT_i/nginx/ssl/cert.pem \
                    -subj "/C=KE/ST=Kenya/L=Nairobi/O=Event-i/CN=event-i.co.ke" 2>&1 || {
                    echo "❌ Failed to create self-signed certificate"
                    exit 1
                  }
                  echo "✅ Self-signed certificate created"
                fi
              fi
            else
              echo "📝 No existing certificates, generating new ones..."
              # Install certbot if needed
              if ! command -v certbot &> /dev/null; then
                echo "📦 Installing certbot..."
                sudo apt update
                sudo apt install -y certbot 2>/dev/null || {
                  # Fall back to snap if apt fails
                  sudo apt install -y snapd
                  sudo snap install core
                  sudo snap refresh core
                  sudo snap install --classic certbot
                  sudo ln -sf /snap/bin/certbot /usr/bin/certbot
                }
              fi
              
              # Try to generate new certificate
              if sudo certbot certonly --standalone --non-interactive --agree-tos --email admin@event-i.co.ke -d event-i.co.ke; then
                echo "✅ Let's Encrypt certificate generated successfully"
                sudo cp "$CERT_PATH" /root/MVPEVENT_i/nginx/ssl/cert.pem
                sudo cp /etc/letsencrypt/live/event-i.co.ke/privkey.pem /root/MVPEVENT_i/nginx/ssl/key.pem
              else
                echo "⚠️ Let's Encrypt failed (possibly rate limited), creating self-signed certificate..."
                sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout /root/MVPEVENT_i/nginx/ssl/key.pem \
                  -out /root/MVPEVENT_i/nginx/ssl/cert.pem \
                  -subj "/C=KE/ST=Kenya/L=Nairobi/O=Event-i/CN=event-i.co.ke"
              fi
            fi
            
            # Ensure certificates have correct permissions
            sudo chmod 644 /root/MVPEVENT_i/nginx/ssl/cert.pem
            sudo chmod 600 /root/MVPEVENT_i/nginx/ssl/key.pem
            echo "✅ SSL certificates configured"
            
            # Update .env with Docker service names
            sudo cp /root/MVPEVENT_i/.env /root/MVPEVENT_i/.env.backup
            MONGO_USER="${{ secrets.MONGO_ROOT_USERNAME }}"
            MONGO_PASS="${{ secrets.MONGO_ROOT_PASSWORD }}"
            MONGO_PASS_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote(\"${MONGO_PASS}\"))")
            sudo sed -i "s|MONGODB_URI=.*|MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASS_ENCODED}@mongodb:27017/event_i_production?authSource=admin|g" /root/MVPEVENT_i/.env
            sudo sed -i "s|REDIS_URL=.*|REDIS_URL=redis://redis:6379|g" /root/MVPEVENT_i/.env
            
            # Deploy with Docker Compose
            cd /root/MVPEVENT_i
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans || true
            echo "🔨 Building Docker images (this may take several minutes)..."
            BUILD_SUCCESS=false
            timeout 1800 sudo docker compose -f docker-compose.prod.yml build --no-cache --pull && BUILD_SUCCESS=true || {
              echo "⚠️ Build timed out or failed, trying without --pull..."
              timeout 1800 sudo docker compose -f docker-compose.prod.yml build --no-cache && BUILD_SUCCESS=true || {
                echo "⚠️ Build failed, trying with cache..."
                sudo docker compose -f docker-compose.prod.yml build && BUILD_SUCCESS=true || {
                  echo "❌ All build attempts failed"
                  BUILD_SUCCESS=false
                }
              }
            }
            
            if [ "$BUILD_SUCCESS" = false ]; then
              echo "❌ Docker build failed after all attempts"
              exit 1
            fi
            
            echo "🚀 Starting containers..."
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans || {
              echo "❌ Failed to start containers"
              echo "📋 Checking container status..."
              sudo docker compose -f docker-compose.prod.yml ps
              echo "📋 Recent logs:"
              sudo docker compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            }
            
            # Wait and verify
            echo "⏳ Waiting for services to start..."
            sleep 30
            
            echo "📋 Container Status:"
            sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml ps
            
            # Verify all containers are running
            if sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml ps | grep -q "Up"; then
              echo "✅ Containers are running"
              # Check for any exited containers
              EXITED_COUNT=$(sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml ps | grep -c "Exited" || echo "0")
              if [ "$EXITED_COUNT" -gt 0 ]; then
                echo "⚠️ Some containers have exited ($EXITED_COUNT)"
                echo "📋 Container logs:"
                sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml logs --tail=50
                echo "⚠️ Deployment completed with warnings - some containers may not be running"
              else
                echo "✅ All containers are running successfully"
                echo "✅ Deployment completed successfully!"
              fi
            else
              echo "❌ No containers are running"
              echo "📋 Container logs:"
              sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml logs --tail=50
              exit 1
            fi
            DEPLOYMENT_SCRIPT
            
            chmod +x /tmp/deploy.sh
            sudo bash /tmp/deploy.sh
            rm /tmp/deploy.sh

  # ====================
  # HEALTH CHECK JOB
  # ====================
  health-check:
    needs: execute
    runs-on: ubuntu-latest
    if: always() && needs.execute.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: SSH health check on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            echo "🏥 Starting health checks..."
            
            # Wait for services to fully initialize
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            # Check container status
            echo "📋 Checking container status..."
            cd /root/MVPEVENT_i || sudo chmod 755 /root && cd /root/MVPEVENT_i
            sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml ps
            
            # Check if all containers are running
            if ! sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml ps | grep -q "Up"; then
              echo "❌ Some containers are not running"
              echo "📋 Container logs:"
              sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml logs --tail=50
              exit 1
            fi
            echo "✅ All containers are running"
            
            # Test API health endpoint
            echo "🔍 Testing API health endpoint..."
            api_healthy=false
            for i in {1..5}; do
              if curl -f -s -k https://event-i.co.ke/api/health > /dev/null 2>&1; then
                echo "✅ API health check passed (attempt $i)"
                api_healthy=true
                break
              else
                echo "⏳ API health check attempt $i failed, retrying..."
                sleep 5
              fi
            done
            
            if [ "$api_healthy" = false ]; then
              echo "❌ API health check failed after 5 attempts"
              echo "📋 Server logs:"
              sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml logs server --tail=50
              exit 1
            fi

            # Temporary Google OAuth redirect check
            echo "🔍 Testing Google OAuth redirect..."
            OAUTH_HEADERS=$(curl -s -I -L --max-redirs 0 https://event-i.co.ke/api/auth/google 2>/dev/null || true)
            OAUTH_CODE=$(echo "$OAUTH_HEADERS" | head -n 1 | awk '{print $2}' || echo "")
            OAUTH_LOCATION=$(echo "$OAUTH_HEADERS" | grep -i '^location:' | head -n 1 | tr -d '\r' | cut -d' ' -f2- || true)
            echo "OAuth status: ${OAUTH_CODE}"
            echo "OAuth location: ${OAUTH_LOCATION}"
            if [ "$OAUTH_CODE" != "302" ] && [ "$OAUTH_CODE" != "303" ]; then
              echo "❌ Google OAuth endpoint did not return 302/303"
              exit 1
            fi
            if ! echo "$OAUTH_LOCATION" | grep -qi "accounts.google.com"; then
              echo "❌ Google OAuth did not redirect to accounts.google.com"
              exit 1
            fi
            
            # Test frontend accessibility
            echo "🔍 Testing frontend accessibility..."
            frontend_healthy=false
            for i in {1..5}; do
              if curl -f -s -k https://event-i.co.ke/ > /dev/null 2>&1; then
                echo "✅ Frontend accessibility check passed (attempt $i)"
                frontend_healthy=true
                break
              else
                echo "⏳ Frontend accessibility check attempt $i failed, retrying..."
                sleep 5
              fi
            done
            
            if [ "$frontend_healthy" = false ]; then
              echo "❌ Frontend accessibility check failed after 5 attempts"
              echo "📋 Client logs:"
              sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml logs client --tail=50
              exit 1
            fi
            
            # Summary
            echo ""
            echo "📊 Health Check Summary"
            echo "===================="
            echo "✅ All containers running"
            echo "✅ API health endpoint responding"
            echo "✅ Frontend accessible"
            echo ""
            echo "🔗 Service URLs:"
            echo "   Frontend: https://event-i.co.ke/"
            echo "   API:      https://event-i.co.ke/api/health"
            echo "   Health:   https://event-i.co.ke/health"
            echo ""
            echo "✅ All health checks passed!"

  # ====================
  # EMAIL HEALTH CHECK JOB
  # ====================
  email-check:
    needs: health-check
    runs-on: ubuntu-latest
    if: always() && needs.health-check.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy email context (commit summary for test emails)
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DEPLOY_GIT_REF: ${{ github.ref_name }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_WORKFLOW: ${{ github.workflow }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node server/scripts/write-deploy-email-context.js

      - name: Upload deploy context to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          source: deploy-email-context.json
          target: /tmp/
          timeout: 120s
          command_timeout: 5m
          debug: true

      - name: SSH email check on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 10m
          debug: true
          script: |
            set -e
            echo "📧 Starting email configuration check..."

            if [ -f /tmp/deploy-email-context.json ]; then
              echo "📦 Copying deploy context into server container (for commit summary in test emails)..."
              cd /root/MVPEVENT_i
              if sudo docker compose -f docker-compose.prod.yml cp /tmp/deploy-email-context.json server:/tmp/deploy-email-context.json 2>/dev/null; then
                echo "✅ deploy-email-context.json copied via compose cp"
              else
                CID=$(sudo docker compose -f docker-compose.prod.yml ps -q server 2>/dev/null || true)
                if [ -n "$CID" ]; then
                  sudo docker cp /tmp/deploy-email-context.json "${CID}:/tmp/deploy-email-context.json" && echo "✅ deploy-email-context.json copied via docker cp"
                else
                  echo "⚠️ Could not resolve server container; test emails will omit deploy summary"
                fi
              fi
              cd - >/dev/null || true
            else
              echo "⚠️ /tmp/deploy-email-context.json missing on VM; test emails will omit deploy summary"
            fi
            echo ""
            
            # Get SMTP configuration from environment
            SMTP_HOST=$(sudo grep SMTP_HOST /root/MVPEVENT_i/.env | cut -d'=' -f2)
            SMTP_PORT=$(sudo grep SMTP_PORT /root/MVPEVENT_i/.env | cut -d'=' -f2)
            EMAIL_FROM=$(sudo grep EMAIL_FROM /root/MVPEVENT_i/.env | cut -d'=' -f2)
            
            echo "📋 SMTP Configuration:"
            echo "   Host: $SMTP_HOST"
            echo "   Port: $SMTP_PORT"
            echo "   From: $EMAIL_FROM"
            echo ""
            
            # Test network connectivity to SMTP server
            echo "🌐 Testing network connectivity to SMTP server..."
            if sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml exec -T server nc -zv -w 5 ${SMTP_HOST} ${SMTP_PORT} 2>&1; then
              echo "✅ Network connectivity OK"
            else
              echo "❌ Cannot reach SMTP server ${SMTP_HOST}:${SMTP_PORT}"
              echo "   Check firewall rules and network configuration"
            fi
            echo ""
            
            # Run email diagnostic test
            echo "🔍 Running SMTP diagnostics..."
            if [ -f "/root/MVPEVENT_i/server/scripts/test-email-debug.js" ]; then
              DIAG_OUTPUT=$(sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml exec -T server node scripts/test-email-debug.js 2>&1) || echo "⚠️ Diagnostic script had issues"
              echo "$DIAG_OUTPUT"
              
              # Check for port mismatch warnings
              WORKING_PORT=$(echo "$DIAG_OUTPUT" | grep -o "Standard TLS (port [0-9]*)" | grep -o "[0-9]*" | head -1 || echo "")
              if [ ! -z "$WORKING_PORT" ] && [ "$WORKING_PORT" != "$SMTP_PORT" ]; then
                echo ""
                echo "⚠️ SMTP Port Mismatch Detected!"
                echo "   Current SMTP_PORT: ${SMTP_PORT}"
                echo "   Working port: ${WORKING_PORT}"
                echo "   Recommendation: Update GitHub Secret SMTP_PORT to ${WORKING_PORT}"
              fi
              
              # Check if email was sent successfully
              if echo "$DIAG_OUTPUT" | grep -q "Test email sent successfully"; then
                echo ""
                echo "✅ Email test PASSED"
                EMAIL_HEALTHY=true
              else
                echo ""
                echo "⚠️ Email test did not send successfully"
                EMAIL_HEALTHY=false
              fi
            else
              echo "⚠️ Diagnostic script not found, skipping advanced checks"
              EMAIL_HEALTHY=true
            fi
            echo ""
            
            # Run basic email test
            echo "📧 Running basic email test..."
            if [ -f "/root/MVPEVENT_i/server/scripts/test-email.js" ]; then
              if sudo docker compose -f /root/MVPEVENT_i/docker-compose.prod.yml exec -T server node scripts/test-email.js 2>&1; then
                echo "✅ Basic email test PASSED"
              else
                echo "⚠️ Basic email test had issues"
                echo "   Check SMTP configuration and logs"
              fi
            else
              echo "⚠️ test-email.js not found, skipping basic test"
            fi
            echo ""
            
            # Summary
            echo "📊 Email Health Check Summary"
            echo "============================="
            echo "✅ SMTP connectivity tested"
            echo "${EMAIL_HEALTHY:+✅}${EMAIL_HEALTHY:-⚠️} Email test results"
            echo ""
            echo "💡 Note: Email configuration may need adjustments"
            echo "   Check container logs if email functionality fails"
